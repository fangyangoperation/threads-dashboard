<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧵 Threads 監控儀表板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Sora:wght@300;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0d0f14;--bg2:#151820;--bg3:#1c1f2a;--border:#252835;--accent:#7c6fff;--accent2:#a78bfa;--green:#34d399;--amber:#fbbf24;--red:#f87171;--blue:#60a5fa;--text:#e8eaf0;--muted:#6b7280;--card-r:14px;--font-jp:'Noto Sans TC',sans-serif;--font-en:'Sora',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-jp);min-height:100vh;line-height:1.6;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none;z-index:0}
#app{position:relative;z-index:1}
.header{background:linear-gradient(135deg,#1a1d2e 0%,#151820 60%,#0d1018 100%);border-bottom:1px solid var(--border);padding:0 24px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:16px}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--font-en);font-weight:800;font-size:1.2rem;letter-spacing:-.02em;color:var(--text);user-select:none}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 0 16px rgba(124,111,255,.4)}
.version-badge{font-size:.65rem;font-family:var(--font-en);background:rgba(124,111,255,.2);color:var(--accent2);border:1px solid rgba(124,111,255,.3);padding:2px 7px;border-radius:20px;font-weight:600;letter-spacing:.05em}
.header-actions{display:flex;align-items:center;gap:10px}
.header-meta{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap;font-family:var(--font-jp)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#6455e8);color:#fff;box-shadow:0 4px 14px rgba(124,111,255,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,111,255,.5)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg);border-color:var(--accent);color:var(--accent2)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-sm{padding:5px 11px;font-size:.78rem;border-radius:6px}
.main{max-width:1400px;margin:0 auto;padding:24px}
.filter-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:16px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.filter-bar select,.filter-bar input[type=text]{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:.85rem;font-family:var(--font-jp);cursor:pointer;transition:border-color .2s;min-width:120px}
.filter-bar select:hover,.filter-bar input[type=text]:hover{border-color:var(--accent)}
.filter-bar select:focus,.filter-bar input[type=text]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,111,255,.15)}
.filter-bar input[type=text]{min-width:200px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.stats-grid{grid-template-columns:1fr}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:20px 22px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s}
.stat-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--card-r) var(--card-r) 0 0}
.stat-card.purple::before{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.stat-card.green::before{background:linear-gradient(90deg,var(--green),#10b981)}
.stat-card.blue::before{background:linear-gradient(90deg,var(--blue),#3b82f6)}
.stat-card.amber::before{background:linear-gradient(90deg,var(--amber),#f59e0b)}
.stat-label{font-size:.78rem;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px}
.stat-value{font-family:var(--font-en);font-size:2rem;font-weight:800;line-height:1;margin-bottom:6px}
.stat-card.purple .stat-value{color:var(--accent2)}
.stat-card.green .stat-value{color:var(--green)}
.stat-card.blue .stat-value{color:var(--blue)}
.stat-card.amber .stat-value{color:var(--amber)}
.stat-sub{font-size:.78rem;color:var(--muted)}
.stat-icon{position:absolute;right:18px;top:18px;font-size:1.4rem;opacity:.5}
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:800px){.charts-row{grid-template-columns:1fr}}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:20px}
.chart-card h3{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.chart-card h3 .dot{width:8px;height:8px;border-radius:50%}
.chart-card canvas{max-height:240px}
.top3-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:20px;margin-bottom:24px}
.top3-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.top3-header h3{font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:8px}
.top3-list{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:800px){.top3-list{grid-template-columns:1fr}}
.top3-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.top3-item:hover{border-color:var(--accent);background:rgba(124,111,255,.08)}
.rank-badge{font-family:var(--font-en);font-size:1.6rem;font-weight:800;position:absolute;right:12px;top:10px;opacity:.15}
.top3-item.rank-1 .rank-badge{color:var(--amber);opacity:.4}
.top3-item.rank-2 .rank-badge{color:#94a3b8;opacity:.3}
.top3-item.rank-3 .rank-badge{color:#92400e;opacity:.3}
.top3-account{font-size:.72rem;color:var(--accent2);font-weight:600;margin-bottom:6px}
.top3-content{font-size:.82rem;color:var(--text);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.top3-metrics{display:flex;gap:12px;flex-wrap:wrap}
.metric-pill{font-size:.72rem;font-family:var(--font-en);font-weight:600;padding:2px 8px;border-radius:20px;display:flex;align-items:center;gap:4px}
.metric-pill.views{background:rgba(96,165,250,.15);color:var(--blue)}
.metric-pill.likes{background:rgba(248,113,113,.15);color:var(--red)}
.metric-pill.replies{background:rgba(52,211,153,.15);color:var(--green)}
.posts-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);overflow:hidden}
.posts-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.posts-header h3{font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:8px}
.posts-count{font-size:.78rem;color:var(--muted)}
.post-card{padding:16px 20px;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
.post-card:last-child{border-bottom:none}
.post-card:hover{background:rgba(124,111,255,.05)}
.post-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
.tag-account{background:rgba(124,111,255,.15);color:var(--accent2)}
.tag-topic{background:rgba(52,211,153,.12);color:var(--green)}
.tag-region{background:rgba(251,191,36,.12);color:var(--amber)}
.tag-date{color:var(--muted);font-size:.7rem}
.post-content{font-size:.88rem;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.6;margin-bottom:10px}
.post-stats{display:flex;align-items:center;gap:14px;font-size:.78rem;color:var(--muted);flex-wrap:wrap}
.post-stat{display:flex;align-items:center;gap:4px}
.post-stat span:first-child{font-size:.82rem}
.post-stat .val{font-family:var(--font-en);font-weight:600;color:var(--text)}
.view-detail-btn{margin-left:auto;font-size:.72rem;color:var(--accent2);background:none;border:1px solid rgba(124,111,255,.3);padding:3px 10px;border-radius:5px;cursor:pointer;transition:all .15s;font-family:var(--font-jp);white-space:nowrap}
.view-detail-btn:hover{background:rgba(124,111,255,.15)}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 20px;border-top:1px solid var(--border)}
.page-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:.82rem;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text);transition:all .15s;font-family:var(--font-en)}
.page-btn:hover{border-color:var(--accent);color:var(--accent2)}
.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.page-btn:disabled{opacity:.3;cursor:not-allowed}
.page-info{font-size:.8rem;color:var(--muted);padding:0 6px}
/* ── 問題反映 ── */
.feedback-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--card-r);padding:20px;margin-top:24px}
.feedback-card h3{font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.feedback-desc{font-size:.78rem;color:var(--muted);margin-bottom:14px}
.feedback-textarea{width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:.88rem;font-family:var(--font-jp);resize:vertical;min-height:90px;transition:border-color .2s,box-shadow .2s;line-height:1.7}
.feedback-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,111,255,.12)}
.feedback-textarea::placeholder{color:var(--muted)}
.feedback-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-header h3{font-size:1rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:4px;transition:color .15s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:22px}
.detail-field{margin-bottom:16px}
.detail-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.detail-value{font-size:.9rem;color:var(--text);line-height:1.7;word-break:break-word}
.detail-value a{color:var(--accent2);text-decoration:none}
.detail-value a:hover{text-decoration:underline}
.detail-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.detail-metric{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.detail-metric .dm-val{font-family:var(--font-en);font-size:1.2rem;font-weight:800;color:var(--accent2)}
.detail-metric .dm-label{font-size:.68rem;color:var(--muted);margin-top:2px}
.form-group{margin-bottom:16px}
.form-label{font-size:.82rem;color:var(--muted);margin-bottom:6px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:.88rem;font-family:var(--font-jp);transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,111,255,.12)}
.form-textarea{resize:vertical;min-height:100px}
.form-footer{display:flex;justify-content:flex-end;gap:10px;padding-top:4px}
.char-count{font-size:.72rem;color:var(--muted);text-align:right;margin-top:4px}
/* ── Loading ── */
.loading-overlay{position:fixed;inset:0;background:rgba(13,15,20,.85);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;gap:16px;opacity:0;pointer-events:none;transition:opacity .3s}
.loading-overlay.show{opacity:1;pointer-events:all}
.spinner{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.88rem;color:var(--muted)}
/* ── Toast ── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:3000;display:flex;flex-direction:column-reverse;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:.85rem;color:var(--text);display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.4);min-width:240px;max-width:360px;animation:slideIn .25s ease;pointer-events:none}
.toast.success{border-color:rgba(52,211,153,.4)}
.toast.error{border-color:rgba(248,113,113,.4)}
.toast-icon{font-size:1rem}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .empty-icon{font-size:2.5rem;margin-bottom:12px}
.empty-state p{font-size:.9rem}
.sep{height:1px;background:var(--border);margin:20px 0}
.filter-badge{font-size:.7rem;background:rgba(124,111,255,.2);color:var(--accent2);border:1px solid rgba(124,111,255,.3);padding:2px 8px;border-radius:20px;font-weight:600}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
@media(max-width:640px){
  .header-inner{padding:10px 0}
  .main{padding:16px}
  .filter-bar{gap:8px}
  .filter-bar select,.filter-bar input[type=text]{min-width:unset;width:100%}
  .detail-metrics{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div id="app">
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><span class="loading-text" id="loadingText">載入資料中…</span></div>
<div class="toast-container" id="toastContainer"></div>

<header class="header">
  <div class="header-inner">
    <div class="logo"><div class="logo-icon">🧵</div>Threads 監控儀表板<span class="version-badge">v10</span></div>
    <div class="header-actions">
      <div class="header-meta"><span id="lastUpdateTime">–</span><span id="filterBadge"></span></div>
      <button class="btn btn-secondary btn-sm" onclick="refreshData()">🔄 更新資料</button>
      <button class="btn btn-primary btn-sm" onclick="openPostModal()">➕ 發布貼文</button>
    </div>
  </div>
</header>

<main class="main">

  <!-- 篩選列 -->
  <div class="filter-bar">
    <select id="filterAccount" onchange="applyFilters()"><option value="">📋 所有帳號</option></select>
    <select id="filterTopic"   onchange="applyFilters()"><option value="">🏷️ 所有主題</option></select>
    <select id="filterRegion"  onchange="applyFilters()"><option value="">🌏 所有地區</option></select>
    <select id="filterMonth"   onchange="applyFilters()">
      <option value="">📅 所有月份</option>
      <option value="1">1 月</option><option value="2">2 月</option><option value="3">3 月</option>
      <option value="4">4 月</option><option value="5">5 月</option><option value="6">6 月</option>
      <option value="7">7 月</option><option value="8">8 月</option><option value="9">9 月</option>
      <option value="10">10 月</option><option value="11">11 月</option><option value="12">12 月</option>
    </select>
    <input type="text" id="filterKeyword" placeholder="🔍 搜尋貼文內容…" oninput="debounceFilter()">
    <button class="btn btn-secondary btn-sm" onclick="clearFilters()">✕ 清除</button>
  </div>

  <!-- 統計卡片 -->
  <div class="stats-grid">
    <div class="stat-card purple"><div class="stat-icon">📝</div><div class="stat-label">總貼文數</div><div class="stat-value" id="statPosts">–</div><div class="stat-sub" id="statPostsSub">已收集貼文</div></div>
    <div class="stat-card green"> <div class="stat-icon">👁️</div><div class="stat-label">總瀏覽數</div><div class="stat-value" id="statViews">–</div><div class="stat-sub" id="statViewsSub">累計觸及</div></div>
    <div class="stat-card blue">  <div class="stat-icon">📊</div><div class="stat-label">平均瀏覽 / 篇</div><div class="stat-value" id="statAvgViews">–</div><div class="stat-sub">每篇平均</div></div>
    <div class="stat-card amber"> <div class="stat-icon">❤️</div><div class="stat-label">平均愛心 / 篇</div><div class="stat-value" id="statAvgLikes">–</div><div class="stat-sub" id="statLikesSub">互動指標</div></div>
  </div>

  <!-- 圖表 -->
  <div class="charts-row">
    <div class="chart-card"><h3><span class="dot" style="background:var(--accent)"></span>發文趨勢（近 30 天）</h3><canvas id="trendChart"></canvas></div>
    <div class="chart-card"><h3><span class="dot" style="background:var(--green)"></span>主題分布</h3><canvas id="topicChart"></canvas></div>
  </div>

  <!-- Top 3 -->
  <div class="top3-card">
    <div class="top3-header">
      <h3>🏆 Top 3 貼文</h3>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select id="top3Month" onchange="loadTop3()" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:.8rem;font-family:var(--font-jp)">
          <option value="">全部月份</option>
          <option value="1">1 月</option><option value="2">2 月</option><option value="3">3 月</option>
          <option value="4">4 月</option><option value="5">5 月</option><option value="6">6 月</option>
          <option value="7">7 月</option><option value="8">8 月</option><option value="9">9 月</option>
          <option value="10">10 月</option><option value="11">11 月</option><option value="12">12 月</option>
        </select>
        <select id="top3Metric" onchange="loadTop3()" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:.8rem;font-family:var(--font-jp)">
          <option value="views">依瀏覽數</option><option value="likes">依愛心數</option>
          <option value="replies">依留言數</option><option value="engagement">依互動率</option>
        </select>
      </div>
    </div>
    <div class="top3-list" id="top3List"><div class="empty-state"><div class="empty-icon">🏆</div><p>載入中…</p></div></div>
  </div>

  <!-- 貼文列表 -->
  <div class="posts-section">
    <div class="posts-header">
      <h3>📝 貼文列表 <span class="posts-count" id="postsCountLabel"></span></h3>
      <span style="font-size:.78rem;color:var(--muted)" id="pageInfo"></span>
    </div>
    <div id="postList"><div class="empty-state"><div class="empty-icon">📋</div><p>載入中…</p></div></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- ── 問題反映 ── -->
  <div class="feedback-card">
    <h3>🐛 問題反映</h3>
    <p class="feedback-desc">遇到問題或數據異常？填寫後會自動記錄到 Google Sheets，方便追蹤處理。</p>
    <textarea
      class="feedback-textarea"
      id="feedbackText"
      placeholder="請描述你遇到的問題，例如：某帳號數據顯示異常、功能無法使用、數字跑掉了…"
      oninput="updateCharCount('feedbackText','feedbackCharCount',500)"
    ></textarea>
    <div class="feedback-footer">
      <span style="font-size:.72rem;color:var(--muted)" id="feedbackCharCount">0 / 500</span>
      <button class="btn btn-primary btn-sm" id="feedbackBtn" onclick="submitFeedbackForm()">📨 送出回報</button>
    </div>
  </div>

</main>
</div>

<!-- 詳情 Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header"><h3>📋 貼文詳情</h3><button class="modal-close" onclick="closeModal('detailModal')">✕</button></div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- 發文 Modal -->
<div class="modal-overlay" id="postModal">
  <div class="modal">
    <div class="modal-header"><h3>➕ 發布貼文</h3><button class="modal-close" onclick="closeModal('postModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">帳號 *</label><select class="form-select" id="postAccount"><option value="">請選擇帳號…</option></select></div>
      <div class="form-group"><label class="form-label">貼文內容 *</label><textarea class="form-textarea" id="postContent" placeholder="輸入貼文內容…" oninput="updateCharCount('postContent','postCharCount',500)"></textarea><div class="char-count" id="postCharCount">0 / 500</div></div>
      <div class="form-group"><label class="form-label">圖片網址（選填）</label><input class="form-input" type="text" id="postImageUrl" placeholder="https://…"></div>
      <div class="form-footer"><button class="btn btn-secondary" onclick="closeModal('postModal')">取消</button><button class="btn btn-primary" onclick="submitPost()">🚀 發布</button></div>
    </div>
  </div>
</div>

<!-- 回文 Modal -->
<div class="modal-overlay" id="replyModal">
  <div class="modal">
    <div class="modal-header"><h3>💬 發布回文</h3><button class="modal-close" onclick="closeModal('replyModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">帳號 *</label><select class="form-select" id="replyAccount"><option value="">請選擇帳號…</option></select></div>
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px"><div style="font-size:.72rem;color:var(--muted);margin-bottom:4px">回覆貼文</div><div style="font-size:.82rem;color:var(--text)" id="replyTargetContent">–</div></div>
      <div class="form-group"><label class="form-label">回文內容 *</label><textarea class="form-textarea" id="replyContent" placeholder="輸入回文內容…" oninput="updateCharCount('replyContent','replyCharCount',500)"></textarea><div class="char-count" id="replyCharCount">0 / 500</div></div>
      <div class="form-footer"><button class="btn btn-secondary" onclick="closeModal('replyModal')">取消</button><button class="btn btn-primary" onclick="submitReply()">💬 回覆</button></div>
    </div>
  </div>
</div>

<script>
// ── 設定 ──
const API_URL = 'https://script.google.com/macros/s/AKfycbwdNuUuKA1HS9JmrWdTGsWqhG1TyU09v43tk25ToXjSx2Jt65rja1fT75lOh7dUa6Do/exec';

// ── 狀態 ──
const STATE = {
  allPosts:[],filteredPosts:[],currentPage:1,pageSize:30,
  accounts:[],topics:[],regions:[],
  replyTargetId:null,replyTargetAccount:null,
  charts:{trend:null,topic:null}
};

// ── API ──
async function apiGet(action,params={}){
  Object.keys(params).forEach(k=>(params[k]===undefined||params[k]==='')&&delete params[k]);
  const url=`${API_URL}?${new URLSearchParams({action,...params})}`;
  try{const json=await fetch(url,{redirect:'follow'}).then(r=>r.json());if(!json.success)throw new Error(json.message||'未知錯誤');return json.data;}
  catch(e){console.error('apiGet',action,e);throw e;}
}
async function apiPost(action,data){
  try{return await fetch(API_URL,{method:'POST',body:JSON.stringify({action,data}),headers:{'Content-Type':'application/json'},redirect:'follow'}).then(r=>r.json());}
  catch(e){console.error('apiPost',e);throw e;}
}

// ── 初始化 ──
window.addEventListener('load',async()=>{
  showLoading('初始化儀表板…');
  try{
    await loadFilterOptions();
    await Promise.all([loadDashboardData(),loadStats(),loadTrendChart(),loadTopicChart(),loadTop3()]);
  }catch(e){toast('error','❌ 載入失敗：'+e.message);}
  finally{hideLoading();}
});

async function refreshData(){
  showLoading('更新資料…');
  try{
    await Promise.all([loadDashboardData(),loadTrendChart(),loadTopicChart(),loadTop3()]);
    loadStatsFromPosts();
    toast('success','✅ 資料已更新！');
  }catch(e){toast('error','❌ 更新失敗：'+e.message);}
  finally{hideLoading();}
}

// ── 資料載入 ──
async function loadFilterOptions(){
  try{
    const opts=await apiGet('getFilterOptions');if(!opts)return;
    STATE.accounts=opts.accounts||[];STATE.topics=opts.topics||[];STATE.regions=opts.regions||[];
    populateSelect('filterAccount',STATE.accounts,'📋 所有帳號');
    populateSelect('filterTopic',STATE.topics,'🏷️ 所有主題');
    populateSelect('filterRegion',STATE.regions,'🌏 所有地區');
    populateSelect('postAccount',STATE.accounts,'請選擇帳號…');
    populateSelect('replyAccount',STATE.accounts,'請選擇帳號…');
  }catch(e){console.warn('loadFilterOptions:',e);}
}

async function loadDashboardData(){
  const f=getActiveFilters();
  try{
    const result=await apiGet('getDashboardData',f);
    STATE.allPosts=result?(result.posts||result||[]):[];
    applyLocalFilter();
    if(result?.lastUpdate)
      document.getElementById('lastUpdateTime').textContent='更新 '+new Date(result.lastUpdate).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  }catch(e){STATE.allPosts=[];renderPostList([]);toast('error','⚠️ 載入貼文失敗：'+e.message);}
}

async function loadStats(){
  try{const s=await apiGet('getStats');if(s)updateStatCards(s.totalPosts,s.totalViews,s.avgViews,s.avgLikes,s.totalLikes,s.totalReplies);}
  catch(e){console.warn('loadStats:',e);}
}

function loadStatsFromPosts(){
  const posts=STATE.filteredPosts,n=posts.length;
  const tv=posts.reduce((s,p)=>s+p.views,0),tl=posts.reduce((s,p)=>s+p.likes,0),tr=posts.reduce((s,p)=>s+p.replies,0);
  updateStatCards(n,tv,n?Math.round(tv/n):0,n?Math.round(tl/n):0,tl,tr);
}

function updateStatCards(totalPosts,totalViews,avgViews,avgLikes,totalLikes,totalReplies){
  document.getElementById('statPosts').textContent=fmtNum(totalPosts);
  document.getElementById('statViews').textContent=fmtNum(totalViews);
  document.getElementById('statAvgViews').textContent=fmtNum(avgViews);
  document.getElementById('statAvgLikes').textContent=fmtNum(avgLikes);
  document.getElementById('statViewsSub').textContent=`總愛心 ${fmtNum(totalLikes)}`;
  document.getElementById('statLikesSub').textContent=`總留言 ${fmtNum(totalReplies)}`;
}

async function loadTrendChart(){
  try{
    const acc=document.getElementById('filterAccount').value;
    const params={days:30};if(acc)params.account=acc;
    const d=await apiGet('getTrend',params);if(d)renderTrendChart(d.dates||[],d.counts||[],d.views||[]);
  }catch(e){console.warn('loadTrendChart:',e);}
}

async function loadTopicChart(){
  try{
    const acc=document.getElementById('filterAccount').value,month=document.getElementById('filterMonth').value;
    const params={};if(acc)params.account=acc;if(month)params.month=month;
    const d=await apiGet('getTopicDist',params);if(d)renderTopicChart(d.labels||[],d.data||[],d.colors||[]);
  }catch(e){console.warn('loadTopicChart:',e);}
}

async function loadTop3(){
  try{
    const metric=document.getElementById('top3Metric').value,month=document.getElementById('top3Month').value,acc=document.getElementById('filterAccount').value;
    const params={metric};if(month)params.month=month;if(acc)params.account=acc;
    const d=await apiGet('getTop3',params);
    renderTop3((d&&d.top3)?d.top3:(Array.isArray(d)?d:[]));
  }catch(e){console.warn('loadTop3:',e);}
}

// ── 篩選 ──
function getActiveFilters(){
  const f={};
  const acc=document.getElementById('filterAccount').value,topic=document.getElementById('filterTopic').value,
    region=document.getElementById('filterRegion').value,month=document.getElementById('filterMonth').value,
    kw=document.getElementById('filterKeyword').value.trim();
  if(acc)f.account=acc;if(topic)f.topic=topic;if(region)f.region=region;if(month)f.month=month;if(kw)f.keyword=kw;
  return f;
}

let _dt=null;
function debounceFilter(){clearTimeout(_dt);_dt=setTimeout(applyFilters,350);}

async function applyFilters(){
  showLoading('篩選中…');
  try{
    await loadDashboardData();
    loadStatsFromPosts();
    await Promise.all([loadTrendChart(),loadTopicChart(),loadTop3()]);
    updateFilterBadge();
  }catch(e){toast('error','篩選失敗：'+e.message);}
  finally{hideLoading();}
}

function applyLocalFilter(){
  const acc=document.getElementById('filterAccount').value,topic=document.getElementById('filterTopic').value,
    reg=document.getElementById('filterRegion').value,mon=document.getElementById('filterMonth').value,
    kw=document.getElementById('filterKeyword').value.toLowerCase().trim();
  STATE.filteredPosts=STATE.allPosts.filter(p=>{
    if(acc&&p.account!==acc)return false;if(topic&&p.topic!==topic)return false;
    if(reg&&p.region!==reg)return false;
    if(mon){const m=new Date(p.timestamp).getMonth()+1;if(m!==parseInt(mon))return false;}
    if(kw&&!p.content.toLowerCase().includes(kw))return false;
    return true;
  });
  STATE.currentPage=1;renderPostList(STATE.filteredPosts);updatePagination();
}

function updateFilterBadge(){
  const count=Object.keys(getActiveFilters()).length;
  document.getElementById('filterBadge').innerHTML=count>0?`<span class="filter-badge">篩選中 ${count} 項</span>`:'';
}

function clearFilters(){
  ['filterAccount','filterTopic','filterRegion','filterMonth'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('filterKeyword').value='';
  document.getElementById('filterBadge').innerHTML='';
  applyFilters();
}

// ── 渲染 ──
function renderPostList(posts){
  const container=document.getElementById('postList');
  document.getElementById('postsCountLabel').textContent=`（${posts.length} 篇）`;
  const start=(STATE.currentPage-1)*STATE.pageSize,paged=posts.slice(start,start+STATE.pageSize);
  if(!paged.length){container.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><p>沒有符合條件的貼文</p></div>`;return;}
  container.innerHTML=paged.map(p=>`
    <div class="post-card" onclick="openDetailModal('${p.postId}')">
      <div class="post-meta">
        <span class="tag tag-account">${esc(p.account)}</span>
        ${p.topic?`<span class="tag tag-topic">${esc(p.topic)}</span>`:''}
        ${p.region?`<span class="tag tag-region">${esc(p.region)}</span>`:''}
        <span class="tag-date">${fmtDate(p.timestamp)}</span>
      </div>
      <div class="post-content">${esc(p.content)||'<em style="color:var(--muted)">（無內容）</em>'}</div>
      <div class="post-stats">
        <span class="post-stat">👁 <span class="val">${fmtNum(p.views)}</span></span>
        <span class="post-stat">❤️ <span class="val">${fmtNum(p.likes)}</span></span>
        <span class="post-stat">💬 <span class="val">${fmtNum(p.replies)}</span></span>
        <span class="post-stat">🔄 <span class="val">${fmtNum(p.reposts)}</span></span>
        <button class="view-detail-btn" onclick="event.stopPropagation();openDetailModal('${p.postId}')">查看詳情 →</button>
      </div>
    </div>`).join('');
  updatePagination();
}

function updatePagination(){
  const total=STATE.filteredPosts.length,pages=Math.ceil(total/STATE.pageSize),cur=STATE.currentPage;
  const pag=document.getElementById('pagination');
  document.getElementById('pageInfo').textContent=pages>1?`第 ${cur} / ${pages} 頁`:'';
  if(pages<=1){pag.innerHTML='';return;}
  let html=`<button class="page-btn" ${cur===1?'disabled':''} onclick="goPage(${cur-1})">‹</button>`;
  getPageRange(cur,pages).forEach(p=>{
    if(p==='…')html+=`<span class="page-info">…</span>`;
    else html+=`<button class="page-btn ${p===cur?'active':''}" onclick="goPage(${p})">${p}</button>`;
  });
  html+=`<button class="page-btn" ${cur===pages?'disabled':''} onclick="goPage(${cur+1})">›</button>`;
  pag.innerHTML=html;
}

function getPageRange(cur,total){
  const delta=2,range=[];
  for(let i=Math.max(1,cur-delta);i<=Math.min(total,cur+delta);i++)range.push(i);
  if(range[0]>1){if(range[0]>2)range.unshift('…');range.unshift(1);}
  if(range[range.length-1]<total){if(range[range.length-1]<total-1)range.push('…');range.push(total);}
  return range;
}

function goPage(p){STATE.currentPage=p;renderPostList(STATE.filteredPosts);document.querySelector('.posts-section').scrollIntoView({behavior:'smooth',block:'start'});}

function renderTop3(top3){
  const el=document.getElementById('top3List');
  if(!top3.length){el.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🏆</div><p>無資料</p></div>`;return;}
  el.innerHTML=top3.map(p=>`
    <div class="top3-item rank-${p.rank}" onclick="openDetailModal('${p.postId}')">
      <div class="rank-badge">#${p.rank}</div>
      <div class="top3-account">${esc(p.account)} ${p.region?`· ${esc(p.region)}`:''}</div>
      <div class="top3-content">${esc(p.content)}</div>
      <div class="top3-metrics">
        <span class="metric-pill views">👁 ${fmtNum(p.views)}</span>
        <span class="metric-pill likes">❤️ ${fmtNum(p.likes)}</span>
        <span class="metric-pill replies">💬 ${fmtNum(p.replies)}</span>
      </div>
    </div>`).join('');
}

function renderTrendChart(dates,counts,views){
  const ctx=document.getElementById('trendChart').getContext('2d');
  if(STATE.charts.trend)STATE.charts.trend.destroy();
  STATE.charts.trend=new Chart(ctx,{type:'line',data:{labels:dates.map(d=>d.slice(5)),datasets:[
    {label:'發文數',data:counts,borderColor:'#7c6fff',backgroundColor:'rgba(124,111,255,.1)',fill:true,tension:.4,pointRadius:3,pointBackgroundColor:'#7c6fff',yAxisID:'y'},
    {label:'瀏覽數',data:views,borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.05)',fill:false,tension:.4,pointRadius:2,pointBackgroundColor:'#34d399',yAxisID:'y1',borderDash:[4,2]}
  ]},options:{responsive:true,maintainAspectRatio:true,
    plugins:{legend:{labels:{color:'#6b7280',font:{size:11},boxWidth:12}}},
    scales:{
      x:{ticks:{color:'#6b7280',font:{size:10},maxTicksLimit:8},grid:{color:'#1c1f2a'}},
      y:{ticks:{color:'#6b7280',font:{size:10}},grid:{color:'#1c1f2a'},position:'left'},
      y1:{ticks:{color:'#6b7280',font:{size:10}},grid:{display:false},position:'right'}
    }}});
}

function renderTopicChart(labels,data,colors){
  const ctx=document.getElementById('topicChart').getContext('2d');
  if(STATE.charts.topic)STATE.charts.topic.destroy();
  if(!labels.length)return;
  STATE.charts.topic=new Chart(ctx,{type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderColor:'#151820',borderWidth:2,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:true,
      plugins:{legend:{position:'bottom',labels:{color:'#6b7280',font:{size:10},padding:10,boxWidth:10}}}}});
}

// ── 詳情 Modal ──
function openDetailModal(postId){
  const p=STATE.allPosts.find(x=>x.postId===String(postId));if(!p)return;
  const eng=p.views>0?(((p.likes+p.replies+p.reposts)/p.views)*100).toFixed(2):'0.00';
  document.getElementById('detailBody').innerHTML=`
    <div class="detail-metrics">
      <div class="detail-metric"><div class="dm-val">${fmtNum(p.views)}</div><div class="dm-label">瀏覽</div></div>
      <div class="detail-metric"><div class="dm-val">${fmtNum(p.likes)}</div><div class="dm-label">愛心</div></div>
      <div class="detail-metric"><div class="dm-val">${fmtNum(p.replies)}</div><div class="dm-label">留言</div></div>
      <div class="detail-metric"><div class="dm-val">${fmtNum(p.reposts)}</div><div class="dm-label">轉發</div></div>
      <div class="detail-metric"><div class="dm-val">${eng}%</div><div class="dm-label">互動率</div></div>
    </div>
    <div class="detail-field"><div class="detail-label">帳號</div><div class="detail-value">${esc(p.account)}</div></div>
    <div class="detail-field"><div class="detail-label">發文時間</div><div class="detail-value">${fmtDateFull(p.timestamp)}</div></div>
    ${p.topic?`<div class="detail-field"><div class="detail-label">主題</div><div class="detail-value">${esc(p.topic)}</div></div>`:''}
    ${p.region?`<div class="detail-field"><div class="detail-label">地區</div><div class="detail-value">${esc(p.region)}</div></div>`:''}
    <div class="detail-field"><div class="detail-label">貼文內容</div><div class="detail-value" style="white-space:pre-wrap">${esc(p.content)}</div></div>
    ${p.permalink?`<div class="detail-field"><div class="detail-label">Threads 連結</div><div class="detail-value"><a href="${p.permalink}" target="_blank" rel="noopener">${p.permalink} ↗</a></div></div>`:''}
    <div class="detail-field"><div class="detail-label">CTA 狀態</div><div class="detail-value">${esc(p.ctaStatus||'–')}</div></div>
    <div class="sep"></div>
    <div style="display:flex;justify-content:flex-end;gap:10px">
      <button class="btn btn-secondary btn-sm" onclick="openReplyModal('${p.postId}','${esc(p.account)}','${esc(p.content.substring(0,40))}');closeModal('detailModal')">💬 發回文</button>
      ${p.permalink?`<a href="${p.permalink}" target="_blank" rel="noopener" class="btn btn-primary btn-sm" style="text-decoration:none">🔗 在 Threads 查看</a>`:''}
    </div>`;
  openModal('detailModal');
}

// ── 發文 / 回文 ──
function openPostModal(){document.getElementById('postContent').value='';document.getElementById('postImageUrl').value='';document.getElementById('postCharCount').textContent='0 / 500';openModal('postModal');}
async function submitPost(){
  const account=document.getElementById('postAccount').value,content=document.getElementById('postContent').value.trim(),imageUrl=document.getElementById('postImageUrl').value.trim();
  if(!account){toast('error','請選擇帳號');return;}if(!content){toast('error','請輸入貼文內容');return;}
  showLoading('發布貼文中…');
  try{
    const r=await apiPost('createPost',{account,content,imageUrl:imageUrl||null});
    if(r&&r.success){toast('success','✅ 貼文已發布！');closeModal('postModal');setTimeout(refreshData,2000);}
    else toast('error','❌ 發布失敗：'+(r?.data?.message||r?.message||'未知'));
  }catch(e){toast('error','❌ 發布失敗：'+e.message);}finally{hideLoading();}
}
function openReplyModal(postId,account,preview){
  STATE.replyTargetId=postId;STATE.replyTargetAccount=account;
  document.getElementById('replyTargetContent').textContent=preview+'…';
  document.getElementById('replyAccount').value=account||'';
  document.getElementById('replyContent').value='';
  document.getElementById('replyCharCount').textContent='0 / 500';
  openModal('replyModal');
}
async function submitReply(){
  const account=document.getElementById('replyAccount').value,content=document.getElementById('replyContent').value.trim(),postId=STATE.replyTargetId;
  if(!account){toast('error','請選擇帳號');return;}if(!postId){toast('error','缺少目標貼文 ID');return;}if(!content){toast('error','請輸入回文內容');return;}
  showLoading('發布回文中…');
  try{
    const r=await apiPost('createReply',{account,postId,content});
    if(r&&r.success){toast('success','✅ 回文已發布！');closeModal('replyModal');}
    else toast('error','❌ 回文失敗：'+(r?.data?.message||r?.message||'未知'));
  }catch(e){toast('error','❌ 回文失敗：'+e.message);}finally{hideLoading();}
}

// ── 問題反映（用 GET 避免 CORS）──
async function submitFeedbackForm(){
  const desc=document.getElementById('feedbackText').value.trim();
  if(!desc){toast('error','請填寫問題描述');return;}
  const btn=document.getElementById('feedbackBtn');
  btn.disabled=true;btn.textContent='送出中…';
  try{
    const r=await apiGet('submitFeedback',{description:desc});
    if(r&&r.success){
      toast('success','✅ '+(r.message||'問題已回報，謝謝！'));
      document.getElementById('feedbackText').value='';
      document.getElementById('feedbackCharCount').textContent='0 / 500';
    }else{
      toast('error','❌ 送出失敗：'+(r?.message||'未知錯誤'));
    }
  }catch(e){toast('error','❌ 送出失敗：'+e.message);}
  finally{btn.disabled=false;btn.textContent='📨 送出回報';}
}

// ── UI 工具 ──
function openModal(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden';}
function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow='';}
document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)closeModal(el.id);});});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(el=>closeModal(el.id));});
function showLoading(msg){document.getElementById('loadingText').textContent=msg||'載入中…';document.getElementById('loadingOverlay').classList.add('show');}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show');}
function toast(type,msg){
  const c=document.getElementById('toastContainer'),el=document.createElement('div');
  el.className=`toast ${type}`;el.innerHTML=`<span class="toast-icon">${type==='success'?'✅':'❌'}</span><span>${msg}</span>`;
  c.appendChild(el);setTimeout(()=>el.remove(),3500);
}
function populateSelect(id,items,placeholder){
  const el=document.getElementById(id);if(!el)return;const cur=el.value;
  el.innerHTML=`<option value="">${placeholder}</option>`+items.map(v=>`<option value="${esc(v)}" ${v===cur?'selected':''}>${esc(v)}</option>`).join('');
}
function updateCharCount(tid,cid,max){document.getElementById(cid).textContent=`${document.getElementById(tid).value.length} / ${max}`;}
function fmtNum(n){n=Number(n)||0;if(n>=1000000)return(n/1000000).toFixed(1).replace(/\.0$/,'')+' M';if(n>=1000)return(n/1000).toFixed(1).replace(/\.0$/,'')+' K';return n.toLocaleString('zh-TW');}
function fmtDate(ts){if(!ts)return'–';const d=new Date(ts);if(isNaN(d))return String(ts).slice(0,10);return d.toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'})+' '+d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
function fmtDateFull(ts){if(!ts)return'–';const d=new Date(ts);if(isNaN(d))return String(ts);return d.toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
function esc(str){if(!str)return'';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');}
</script>
